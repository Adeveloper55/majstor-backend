spring.application.name=majstor-na-klik

# Optional local overrides (password, etc.) — not committed if listed in .gitignore
spring.config.import=optional:classpath:application-local.properties

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/majstor_na_klik
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=majstor-na-klik-jwt-secret-change-in-production-min-256-bits!!
jwt.expiration=86400000

# Anthropic AI
anthropic.api.key=
anthropic.model=claude-3-haiku-20240307

# Mail (optional - logs to console if not configured)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Company bank account
app.company.name=Majstor na klik d.o.o.
app.company.bank-name=Banka XYZ
app.company.bank-account=RS35123456789012345678
app.company.payment-instructions=U pozivu na broj unesite va\u0161 email

# App
app.frontend.url=http://localhost:3000
app.backend.url=http://localhost:8080
app.upload.dir=uploads
app.mail.from=noreply@majstornaklik.rs

server.port=8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
