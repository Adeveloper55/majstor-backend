spring.application.name=majstor-na-klik

# Optional local overrides (password, etc.) — not committed if listed in .gitignore
spring.config.import=optional:classpath:application-local.properties

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/majstor_na_klik
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=majstor-na-klik-jwt-secret-change-in-production-min-256-bits!!
jwt.expiration=86400000

# Anthropic AI
anthropic.api.key=
anthropic.model=claude-3-haiku-20240307

# Mail — SMTP se podešava u application-local.properties (ne commituj lozinku)
spring.mail.host=mail.tvojmajstornaklik.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# Company bank account (predračun / IPS QR)
app.company.name=USLUGE INFORMACIONE TEHNOLOGIJE KLIKO
app.company.pib=
app.company.bank-name=UniCredit Banka
app.company.bank-account=170005005439900026
app.company.payment-purpose=Uplata za tokene
app.company.payment-reference=365000001
app.company.payment-model=97
app.company.payment-instructions=Uplatite tačan iznos sa predračuna. Svrha uplate: Uplata za tokene. Nakon uplate sačekajte da admin potvrdi uplatu.

# App
app.frontend.url=http://localhost:3000
app.backend.url=http://localhost:8080
app.upload.dir=uploads
app.mail.from=contact@tvojmajstornaklik.com
app.mail.admin=contact@tvojmajstornaklik.com

server.port=8080

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
