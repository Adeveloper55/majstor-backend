spring.application.name=majstor-365

# Lokalni override (gitignored) — na produkciji koristi env varijable
spring.config.import=optional:classpath:application-local.properties

# Database — na Dokploy-u postavi SPRING_DATASOURCE_*
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/majstor_na_klik}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:majstor-na-klik-jwt-secret-change-in-production-min-256-bits!!}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS — zarezom odvojeni origin-i (npr. https://majstor365.com,https://www.majstor365.com)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Admin seeder
app.admin.seed-enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.email=${APP_ADMIN_EMAIL:admin@majstornaklik.rs}
app.admin.password=${APP_ADMIN_PASSWORD:}
app.admin.reset-password-on-start=${APP_ADMIN_RESET_PASSWORD_ON_START:false}

# Anthropic AI (opciono)
anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=${ANTHROPIC_MODEL:claude-3-haiku-20240307}

# Mail
spring.mail.host=${SPRING_MAIL_HOST:mail.privateemail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:contact@majstor365.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000

# Firma / predračun / IPS QR
app.company.name=${APP_COMPANY_NAME:USLUGE INFORMACIONE TEHNOLOGIJE KLIKO}
app.company.pib=${APP_COMPANY_PIB:}
app.company.bank-name=${APP_COMPANY_BANK_NAME:UniCredit Banka}
app.company.bank-account=${APP_COMPANY_BANK_ACCOUNT:170005005439900026}
app.company.payment-purpose=${APP_COMPANY_PAYMENT_PURPOSE:Uplata za tokene}
app.company.payment-reference=${APP_COMPANY_PAYMENT_REFERENCE:365000001}
app.company.payment-model=${APP_COMPANY_PAYMENT_MODEL:97}
app.company.payment-instructions=${APP_COMPANY_PAYMENT_INSTRUCTIONS:Uplatite tačan iznos sa predračuna. Svrha uplate: Uplata za tokene. Nakon uplate sačekajte da admin potvrdi uplatu.}

# App URLs
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.backend.url=${APP_BACKEND_URL:http://localhost:8080}
app.upload.dir=${APP_UPLOAD_DIR:uploads}
app.mail.from=${APP_MAIL_FROM:contact@majstor365.com}
app.mail.admin=${APP_MAIL_ADMIN:contact@majstor365.com}

server.port=${SERVER_PORT:8080}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
